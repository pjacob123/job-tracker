name: Build & Release

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    if: "!startsWith(github.ref, 'refs/tags/v')"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run package

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: Job-Tracker-Setup
          path: dist/*.exe
          if-no-files-found: error

  release:
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run package
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Job Tracker ${{ github.ref_name }}
          body: |
            ## Job Tracker ${{ github.ref_name }}

            Download and run the installer below to install or update Job Tracker.

            **First time install:** Run `Job Tracker Setup x.x.x.exe` and follow the prompts.
            **Update:** Run the new installer — it will update in place.
          files: dist/*.exe
          draft: false
          prerelease: false
